name: Publish Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES }}

      - name: Publish Python Wheel to PyPI
        run: |
          pip install maturin
          maturin publish -u __token__ -p ${{ secrets.PYPI }}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Otter JSON Enforcer</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 1rem; }
    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    textarea { width: 100%; height: 200px; font-family: monospace; padding: 0.5rem; box-sizing: border-box; }
    button { padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer; }
    #result { margin-top: 1rem; padding: 1rem; background: #f5f5f5; white-space: pre-wrap; font-family: monospace; }
    .error { color: #d00; }
    .valid { color: #080; }
    .repaired { color: #a60; }
  </style>
</head>
<body>
  <h1>Otter JSON Enforcer</h1>
  <div class="container">
    <div>
      <label for="json"><strong>JSON Input</strong></label><br>
      <textarea id="json" placeholder='{"name": "test", "age": 25}'></textarea>
    </div>
    <div>
      <label for="schema"><strong>Schema</strong></label><br>
      <textarea id="schema" placeholder='{"type": "object", "properties": {"name": {"type": "string"}, "age": {"type": "integer"}}}'></textarea>
    </div>
  </div>
  <button id="enforce">Enforce</button>
  <div id="result"></div>
  <script type="module">
    import init, { enforce_wasm } from './pkg/otter.js';

    await init();

    const jsonInput = document.getElementById('json');
    const schemaInput = document.getElementById('schema');
    const resultDiv = document.getElementById('result');
    const btn = document.getElementById('enforce');

    btn.addEventListener('click', () => {
      const json = jsonInput.value;
      const schema = schemaInput.value;

      if (!json || !schema) {
        resultDiv.textContent = 'Please provide both JSON and schema';
        resultDiv.className = 'error';
        return;
      }

      try {
        const res = enforce_wasm(json, schema);
        const status = res.status;
        let output = `Status: ${status}\n`;

        if (res.json) {
          output += `JSON: ${res.json}\n`;
        }
        if (res.prompt) {
          output += `Prompt: ${res.prompt}\n`;
        }
        if (res.error) {
          output += `Error: ${res.error}\n`;
        }

        resultDiv.textContent = output;
        resultDiv.className = status.toLowerCase();
      } catch (e) {
        resultDiv.textContent = e;
        resultDiv.className = 'error';
      }
    });
  </script>
</body>
</html>
